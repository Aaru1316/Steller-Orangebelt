name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  rust-contracts:
    name: Rust Smart Contracts CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
          targets: wasm32v1-none

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check Rust Formatting
        run: cargo fmt --all -- --check
        working-directory: contracts

      - name: Run Clippy Linter
        run: cargo clippy --all-targets -- -D warnings
        working-directory: contracts

      - name: Build Escrow Contract (Target wasm32v1-none)
        run: cargo build --target wasm32v1-none --release -p escrow
        working-directory: contracts

      - name: Build Campaign Contract (Target wasm32v1-none)
        run: cargo build --target wasm32v1-none --release -p campaign
        working-directory: contracts

      - name: Run Cargo Unit Tests
        run: cargo test
        working-directory: contracts

  frontend-react:
    name: Frontend React CI
    runs-on: ubuntu-latest
    needs: rust-contracts

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: frontend

      - name: Generate Mock Contracts Config for CI Build
        run: |
          mkdir -p src
          echo '{"network":"testnet","deployer":"GA2XSJVTLCQHAKG7DNHKE33GETBVGX4JIDOEVAUQIRUUFFQ7VWY4WSWQ","escrowContractId":"CACAATRLLNDKGD3FHA4XLUKKEMGRUESPML5PFETGXSPYERUJZP5LKPWK","campaignContractId":"CALJXWAACIBVO7ERMODME6W2VLET3Q2BT4ULWAECE3OUHPWAHADM3TVP","escrowWasmHash":"eb4ef9cc926d92116c984af18cf888a531047486d6ebc9e672433c6354626613"}' > src/contracts.json
        working-directory: frontend

      - name: Run Frontend Unit Tests
        run: npm run test
        working-directory: frontend

      - name: Build Frontend Application
        run: npm run build
        working-directory: frontend
